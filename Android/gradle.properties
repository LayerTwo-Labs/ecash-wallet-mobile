org.gradle.jvmargs=-Xmx6g
android.useAndroidX=true
kotlin.code.style=official

# Build-speed flags (dev iteration). Safe across AGP/Skip: cache task outputs, run
# independent tasks in parallel, only configure projects that are needed, keep Kotlin
# incremental. (configuration-cache is intentionally left off — it's flaky with some
# AGP/Skip tasks.)
org.gradle.caching=true
org.gradle.parallel=true
org.gradle.configureondemand=true
kotlin.incremental=true
